<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dyltech Booking</title>
  <style>
    body {font-family:Arial,sans-serif;background:#111;color:#eee;text-align:center;padding:20px;}
    form {max-width:600px;margin:20px auto;background:#222;padding:30px;border-radius:15px;}
    input,select,textarea {width:100%;padding:12px;margin:10px 0;border-radius:8px;border:none;}
    button {background:#ff6200;color:white;padding:15px;font-size:18px;border:none;border-radius:8px;width:100%;}
  </style>
</head>
<body>
  <h1>DYLTECH</h1>
  <p style="color:#ff6200;">AMANZIMTOTI • 082 216 6654</p>
  <h2>Book Your Device In</h2>
  
  <form action="/book" method="POST">
    <input type="text" name="first_name" placeholder="First Name" required>
    <input type="text" name="surname" placeholder="Surname" required>
    <input type="email" name="email" placeholder="Email" required>
    <input type="tel" name="phone" placeholder="0822166654" required>
    
    <select name="device" required>
      <option value="">Device Type</option>
      <option value="PC">PC</option>
      <option value="Laptop">Laptop</option>
      <option value="Cellphone">Cellphone</option>
      <option value="MacBook">MacBook</option>
    </select>
    
    <select name="delivery_option">
      <option value="Pickup">Pickup</option>
      <option value="Delivery">Delivery</option>
    </select>
    
    <textarea name="symptoms" rows="5" placeholder="Describe the symptoms..." required></textarea>
    
    <button type="submit">Submit Booking</button>
  </form>
  
  <p><a href="/admin" style="color:#ff6200;">View All Bookings (Admin)</a></p>
</body>
</html>
